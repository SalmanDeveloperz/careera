<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Careera">
  <defs>
    <linearGradient id="careera-bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="careera-path" x1="160" y1="352" x2="360" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="careera-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="118" fill="url(#careera-bg)"/>
  <!-- Compass ring -->
  <circle cx="256" cy="256" r="148" stroke="white" stroke-opacity="0.18" stroke-width="10"/>
  <!-- C-shaped career path rising toward opportunity -->
  <path
    d="M318 148c-72-8-142 28-168 98-20 54-8 118 34 158"
    stroke="url(#careera-path)"
    stroke-width="34"
    stroke-linecap="round"
    fill="none"
  />
  <path
    d="M184 318c42 34 98 44 148 24"
    stroke="url(#careera-path)"
    stroke-width="34"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Upward guidance arrow -->
  <path
    d="M330 170l44-44M330 170l-8 58"
    stroke="white"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Opportunity node -->
  <circle cx="374" cy="126" r="26" fill="#FDE68A" filter="url(#careera-glow)"/>
  <circle cx="374" cy="126" r="14" fill="#FBBF24"/>
</svg>
